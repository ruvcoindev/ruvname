name: 📦 OpenWrt IPK — Xiaomi Mi AX3000T + LuCI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  PKGNAME: ruvname
  PKGVERSION: ${{ github.ref_name }}
  TARGET: aarch64-unknown-linux-musl
  OPENWRT_ARCH: aarch64_cortex-a53
  OPENWRT_ABI: glibc

jobs:
  # === 1. Сборка ruvname.ipk и luci-app-ruvname.ipk ===
  build-openwrt:
    name: Build .ipk for Xiaomi Mi AX3000T (OpenWrt 24.10)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Установка зависимостей
        run: |
          sudo apt update
          sudo apt install -y \
            docker.io \
            upx \
            build-essential \
            fakeroot \
            git \
            wget \
            libssl-dev \
            libglib2.0-dev \
            musl-tools \
            qemu-user-static

      - name: Установка cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Сборка бинарника для OpenWrt (aarch64)
        run: |
          cross build --target ${{ env.TARGET }} --release --no-default-features --features="doh"
          upx --best --lzma target/${{ env.TARGET }}/release/ruvname

      # === Подготовка ruvname.ipk ===
      - name: Подготовка структуры ruvname.ipk
        run: |
          mkdir -p openwrt-package
          cp target/${{ env.TARGET }}/release/ruvname openwrt-package/ruvname
          cp ruvname.toml openwrt-package/ruvname.toml
          mkdir -p openwrt-package/etc/init.d
          mkdir -p openwrt-package/etc/config
          mkdir -p openwrt-package/usr/bin
          mkdir -p openwrt-package/root

      - name: Создание init.d скрипта
        run: |
          cat > openwrt-package/etc/init.d/ruvname << 'EOF'
#!/bin/sh /etc/rc.common

START=99
USE_PROCD=1

start_service() {
  procd_open_instance
  procd_set_param command /usr/bin/ruvname
  procd_set_param respawn
  procd_set_param file /etc/config/ruvname
  procd_close_instance
}

reload_service() {
  /etc/init.d/ruvname restart
}

stop_service() {
  killall ruvname
}

shutdown() {
  killall ruvname
}
EOF
          chmod +x openwrt-package/etc/init.d/ruvname

      - name: Создание /etc/config/ruvname
        run: |
          mkdir -p openwrt-package/etc/config
          cp ruvname.toml openwrt-package/etc/config/ruvname
          echo 'config ruvname' > openwrt-package/etc/config/ruvname
          echo '	option enabled 1' >> openwrt-package/etc/config/ruvname

      - name: Копирование в /usr/bin
        run: |
          cp openwrt-package/ruvname openwrt-package/usr/bin/ruvname
          chmod +x openwrt-package/usr/bin/ruvname

      - name: Создание control для ruvname.ipk
        run: |
          mkdir -p openwrt-package/CONTROL
          cat > openwrt-package/CONTROL/control << EOF
Package: ${{ env.PKGNAME }}
Version: ${{ env.PKGVERSION }}
Architecture: ${{ env.OPENWRT_ARCH }}
Maintainer: ruvcoindev <admin@ruv.name>
Section: network
Priority: optional
Description: Decentralized DNS on Blockchain for OpenWrt
 RUVNAME — децентрализованная система доменных имён на блокчейне.
 Поддерживает: .ruv, .mesh, .node, .p2p, .tamb, .tmb, .dweb, .dht, .hub
EOF

      - name: postinst для ruvname.ipk
        run: |
          cat > openwrt-package/CONTROL/postinst << 'EOF'
#!/bin/sh
chmod 755 /etc/init.d/ruvname
/etc/init.d/ruvname enable
exit 0
EOF
          chmod +x openwrt-package/CONTROL/postinst

      - name: prerm для ruvname.ipk
        run: |
          cat > openwrt-package/CONTROL/prerm << 'EOF'
#!/bin/sh
/etc/init.d/ruvname stop
/etc/init.d/ruvname disable
exit 0
EOF
          chmod +x openwrt-package/CONTROL/prerm

      - name: Упаковка ruvname.ipk
        run: |
          mkdir -p ipk-output
          (cd openwrt-package && find . -type f -not -path './CONTROL*' | xargs md5sum > ./CONTROL/md5sums)
          (cd openwrt-package && find . -type f -path './CONTROL*' -exec rm -f {} \;)
          (cd openwrt-package && find . | sort | tar --owner=0 --group=0 --numeric-owner -czf ../ruvname_${{ env.PKGVERSION }}_${{ env.OPENWRT_ARCH }}_${{ env.OPENWRT_ABI }}-1.ipk -T -)
          mv ruvname_${{ env.PKGVERSION }}_${{ env.OPENWRT_ARCH }}_${{ env.OPENWRT_ABI }}-1.ipk ipk-output/

      # === Сборка luci-app-ruvname.ipk ===
      - name: Подготовка luci-app-ruvname.ipk
        run: |
          mkdir -p luci-app-ruvname/ipk
          mkdir -p luci-app-ruvname/ipk/luasrc/controller
          mkdir -p luci-app-ruvname/ipk/luasrc/model/cbi
          mkdir -p luci-app-ruvname/ipk/luasrc/view/ruvname
          mkdir -p luci-app-ruvname/ipk/root/www/luci-static/ruvname

      - name: Создание luci controller
        run: |
          cat > luci-app-ruvname/ipk/luasrc/controller/ruvname.lua << 'EOF'
module("luci.controller.ruvname", package.seeall)

function index()
    if not nixio.fs.access("/etc/config/ruvname") then
        return
    end

    entry({"admin", "services", "ruvname"}, cbi("ruvname"), _("RUVNAME"), 50)
        .title = _("RUVNAME")
        .index = true

    entry({"admin", "services", "ruvname", "status"}, call("action_status"), _("Status"), 10)
end

function action_status()
    local sys = require "luci.sys"
    local http = require "luci.http"

    local running = sys.call("pgrep ruvname > /dev/null") == 0
    local status = {
        running = running,
        version = sys.exec("ruvname -v 2>/dev/null | head -n1"),
        peers = tonumber(sys.exec("grep -o 'peer_connected' /tmp/log/ruvname.log | wc -l")) or 0,
        domains = tonumber(sys.exec("grep -o 'domain_registered' /tmp/log/ruvname.log | wc -l")) or 0
    }

    http.prepare_content("application/json")
    http.write_json(status)
end
EOF

      - name: Создание luci model (CBI)
        run: |
          cat > luci-app-ruvname/ipk/luasrc/model/cbi/ruvname.lua << 'EOF'
local fs = require "nixio.fs"
local uci = require "luci.model.uci".cursor()

m = Map("ruvname", translate("RUVNAME Settings"),
    translate("Configure decentralized DNS on .ruv, .mesh, .node, .p2p, .tamb, .tmb, .dweb, .dht, .hub"))

s = m:section(NamedSection, "ruvname", "ruvname", translate("General Settings"))
s.addremove = false

o = s:option(Flag, "enabled", translate("Enabled"))
o.rmempty = false
o.enabled = "1"
o.disabled = "0"

o = s:option(Value, "listen", translate("DNS Listen"))
o.placeholder = "127.0.0.1:5311"
o.datatype = "string"

o = s:option(Value, "forwarders", translate("Upstream DNS"))
o.placeholder = "https://dns.adguard.com/dns-query"
o.datatype = "list"

o = s:option(Value, "peers", translate("P2P Peers"))
o.placeholder = "[fa00:4715:66fa:2bd:3032:b5d1:e86f:239c]:6890"
o.datatype = "list"

return m
EOF

      - name: Создание luci view (status.htm)
        run: |
          cat > luci-app-ruvname/ipk/luasrc/view/ruvname/status.htm << 'EOF'
<%+header%>
<h2><%:RUVNAME Status%></h2>

<div id="status">
    <p><%:Loading status...%></p>
</div>

<script type="text/javascript">
    XHR.poll(5, '<%=url("admin/services/ruvname/status")%>', null, function(x) {
        var s = document.getElementById('status');
        if (x && x.responseText) {
            var data = JSON.parse(x.responseText);
            s.innerHTML = `
                <strong>Status:</strong> ${data.running ? 'Running' : 'Stopped'}<br>
                <strong>Version:</strong> ${data.version}<br>
                <strong>Peers:</strong> ${data.peers}<br>
                <strong>Domains:</strong> ${data.domains}<br>
            `;
        }
    });
</script>

<%+footer%>
EOF

      - name: Создание control для luci-app-ruvname.ipk
        run: |
          mkdir -p luci-app-ruvname/ipk/CONTROL
          cat > luci-app-ruvname/ipk/CONTROL/control << EOF
Package: luci-app-ruvname
Version: ${{ env.PKGVERSION }}
Architecture: all
Maintainer: ruvcoindev <admin@ruv.name>
Section: luci
Priority: optional
Title: LuCI interface for RUVNAME
Description: LuCI interface for RUVNAME - Decentralized DNS on Blockchain
Depends: ruvname, luci-base
EOF

      - name: postinst для luci-app
        run: |
          cat > luci-app-ruvname/ipk/CONTROL/postinst << 'EOF'
#!/bin/sh
/etc/init.d/uhttpd restart
exit 0
EOF
          chmod +x luci-app-ruvname/ipk/CONTROL/postinst

      - name: prerm для luci-app
        run: |
          cat > luci-app-ruvname/ipk/CONTROL/prerm << 'EOF'
#!/bin/sh
/etc/init.d/uhttpd restart
exit 0
EOF
          chmod +x luci-app-ruvname/ipk/CONTROL/prerm

      - name: Упаковка luci-app-ruvname.ipk
        run: |
          (cd luci-app-ruvname/ipk && find . | sort | md5sum > CONTROL/md5sums)
          (cd luci-app-ruvname/ipk && find . | sort | tar --owner=0 --group=0 --numeric-owner -czf ../luci-app-ruvname_${{ env.PKGVERSION }}_all.ipk -T -)
          mv luci-app-ruvname_${{ env.PKGVERSION }}_all.ipk ipk-output/

      - name: Загрузка артефактов
        uses: actions/upload-artifact@v3
        with:
          path: ipk-output/

  # === 2. Создание релиза и загрузка .ipk ===
  create_release:
    needs: build-openwrt
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v3
        with:
          name: artifact
          path: ipk-output

      - name: Создание релиза
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 📦 RUVNAME для OpenWrt 24.10

            Этот релиз включает:
            - `ruvname-openwrt-24.10-xiaomi-ax3000t_*.ipk` — основной пакет
            - `luci-app-ruvname_*.ipk` — веб-интерфейс в LuCI

            ### 📥 Установка на роутер

            ```bash
            # Скопируйте пакеты на роутер
            scp ruvname-openwrt-*.ipk luci-app-ruvname_*.ipk root@192.168.1.1:/tmp/

            # Установите
            opkg install /tmp/ruvname-openwrt-*.ipk
            opkg install /tmp/luci-app-ruvname_*.ipk

            # Включите сервис
            /etc/init.d/ruvname enable
            /etc/init.d/ruvname start
            ```

            ### 🌐 LuCI интерфейс
            После установки откройте:
            **LuCI → Services → RUVNAME**

            ### 🛠 Конфигурация
            - Конфиг: `/etc/config/ruvname`
            - Логи: `logread | grep ruvname`
          draft: false
          prerelease: false

      - name: Загрузка ruvname.ipk
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ipk-output/ruvname_${{ env.PKGVERSION }}_${{ env.OPENWRT_ARCH }}_${{ env.OPENWRT_ABI }}-1.ipk
          asset_name: ruvname-openwrt-24.10-xiaomi-ax3000t_${{ env.PKGVERSION }}_${{ env.OPENWRT_ARCH }}.ipk
          asset_content_type: application/x-debian-package

      - name: Загрузка luci-app-ruvname.ipk
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ipk-output/luci-app-ruvname_${{ env.PKGVERSION }}_all.ipk
          asset_name: luci-app-ruvname_${{ env.PKGVERSION }}.ipk
          asset_content_type: application/x-debian-package
