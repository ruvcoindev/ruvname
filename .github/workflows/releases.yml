name: Create Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # v1.2.3

jobs:
  get_version:
    name: Get Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

  create_release:
    name: Create Draft Release
    runs-on: ubuntu-22.04
    needs: get_version
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          tag_name: ${{ needs.get_version.outputs.version }}
          name: ${{ needs.get_version.outputs.version }}
          body: |
            ## New
            * Added new features.

            ## Bug Fixes & Improvements
            * Various fixes and stability improvements.

            ## Documentation & others
            * Updated documentation.
          draft: true
          prerelease: false

  build_and_upload:
    name: Build and Package
    needs: [create_release, get_version]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libglib2.0-dev upx

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build GUI (Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo build --release

      - name: Build Edge (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --features edge

      - name: Build NoGUI
        run: cargo build --release --no-default-features --target-dir ./target-nogui

      - name: Compress binaries (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          if command -v upx > /dev/null; then
            upx --best --lzma target/release/* 2>/dev/null || true
            upx --best --lzma target-nogui/release/* 2>/dev/null || true
          fi

      - name: Set arch variables
        run: |
          case "${{ runner.os }}" in
            "Linux")   echo "ARCH=linux-amd64" ;;
            "Windows") echo "ARCH=windows-amd64" ;;
            "macOS")   echo "ARCH=darwin-amd64" ;;
          esac >> $GITHUB_ENV

      - name: Set paths
        run: |
          echo "BIN_PATH=${{ runner.os == 'Windows' && 'target/release/ruvname.exe' || 'target/release/ruvname' }}" >> $GITHUB_ENV
          echo "ZIP_NAME=ruvname-${{ env.ARCH }}-${{ needs.get_version.outputs.version }}.zip" >> $GITHUB_ENV

          echo "BIN_PATH_NOGUI=${{ runner.os == 'Windows' && 'target-nogui/release/ruvname.exe' || 'target-nogui/release/ruvname' }}" >> $GITHUB_ENV
          echo "ZIP_NAME_NOGUI=ruvname-${{ env.ARCH }}-nogui-${{ needs.get_version.outputs.version }}.zip" >> $GITHUB_ENV

          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "BIN_PATH_EDGE=target/release/ruvname.exe" >> $GITHUB_ENV
            echo "ZIP_NAME_EDGE=ruvname-${{ env.ARCH }}-edge-${{ needs.get_version.outputs.version }}.zip" >> $GITHUB_ENV
          fi

      - name: Package GUI
        uses: papeloto/action-zip@v1
        with:
          files: ${{ env.BIN_PATH }} ruvname.toml README.md LICENSE adblock.txt
          dest: ${{ env.ZIP_NAME }}

      - name: Package NoGUI
        uses: papeloto/action-zip@v1
        with:
          files: ${{ env.BIN_PATH_NOGUI }} ruvname.toml README.md LICENSE adblock.txt
          dest: ${{ env.ZIP_NAME_NOGUI }}

      - name: Package Edge (Windows)
        if: runner.os == 'Windows'
        uses: papeloto/action-zip@v1
        with:
          files: ${{ env.BIN_PATH_EDGE }} ruvname.toml README.md LICENSE adblock.txt
          dest: ${{ env.ZIP_NAME_EDGE }}

      - name: Upload GUI
        uses: actions/upload-release-asset@v4
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ${{ env.ZIP_NAME }}
          asset_name: ${{ env.ZIP_NAME }}
          asset_content_type: application/zip

      - name: Upload NoGUI
        uses: actions/upload-release-asset@v4
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ${{ env.ZIP_NAME_NOGUI }}
          asset_name: ${{ env.ZIP_NAME_NOGUI }}
          asset_content_type: application/zip

      - name: Upload Edge
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v4
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ${{ env.ZIP_NAME_EDGE }}
          asset_name: ${{ env.ZIP_NAME_EDGE }}
          asset_content_type: application/zip
